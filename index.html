<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まなびドリル｜印刷対応ドリル自動生成</title>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#3b82f6;--blue-dark:#1d4ed8;--blue-light:#eff6ff;
  --green:#22c55e;--green-dark:#15803d;
  --orange:#f97316;--yellow:#fbbf24;
  --pink:#ec4899;--purple:#8b5cf6;
  --text:#1e293b;--text-sub:#64748b;
  --border:#e2e8f0;--bg:#f1f5f9;
  --radius:14px;--shadow:0 2px 16px rgba(30,41,59,0.09);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

header{background:linear-gradient(120deg,#1d4ed8 0%,#7c3aed 100%);padding:14px 24px 12px;text-align:center;box-shadow:0 4px 20px rgba(29,78,216,.25);}
header h1{font-family:'Kaisei Decol',serif;font-size:1.6rem;color:#fff;letter-spacing:.06em;}
header p{color:rgba(255,255,255,.78);font-size:.78rem;margin-top:2px;}

.app{display:flex;min-height:calc(100vh - 58px);}
.sidebar{width:300px;min-width:255px;background:#fff;border-right:1px solid var(--border);padding:14px 13px 24px;overflow-y:auto;flex-shrink:0;}
.main-area{flex:1;padding:18px 16px;overflow-y:auto;}
@media(max-width:720px){.app{flex-direction:column;}.sidebar{width:100%;border-right:none;border-bottom:2px solid var(--border);}}

.sec{margin-bottom:16px;}
.sec-title{font-size:.68rem;font-weight:700;color:var(--text-sub);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--border);}

.subject-tabs{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.stab{border:2px solid var(--border);border-radius:9px;padding:8px 4px 6px;cursor:pointer;background:#f8fafc;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.75rem;font-weight:700;font-family:'Noto Sans JP',sans-serif;transition:all .14s;color:var(--text-sub);line-height:1.3;text-align:center;}
.stab .em{font-size:1.25rem;}
.stab:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light);}
.stab.active{border-color:var(--blue);background:var(--blue-light);color:var(--blue-dark);}
.stab[data-s="kanji"].active{border-color:var(--orange);background:#fff7ed;color:#c2410c;}
.stab[data-s="keisan"].active{border-color:var(--green);background:#f0fdf4;color:var(--green-dark);}
.stab[data-s="english"].active{border-color:var(--purple);background:#f5f3ff;color:#5b21b6;}
.stab[data-s="kana"].active{border-color:var(--pink);background:#fdf2f8;color:#9d174d;}

.grade-pills{display:flex;flex-wrap:wrap;gap:5px;}
.gpill{border:2px solid var(--border);border-radius:50px;padding:3px 12px;cursor:pointer;background:#f8fafc;font-size:.75rem;font-weight:700;font-family:'Noto Sans JP',sans-serif;color:var(--text-sub);transition:all .13s;}
.gpill:hover{border-color:var(--blue);color:var(--blue);}
.gpill.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.gpill.disabled{opacity:.28;cursor:not-allowed;pointer-events:none;}

.unit-list{display:flex;flex-direction:column;gap:4px;max-height:220px;overflow-y:auto;}
.ucheck,.gcheck{display:flex;align-items:center;gap:6px;padding:5px 8px;border:2px solid var(--border);border-radius:7px;cursor:pointer;background:#f8fafc;font-size:.77rem;font-weight:700;font-family:'Noto Sans JP',sans-serif;color:var(--text-sub);transition:all .12s;}
.ucheck:hover{border-color:var(--green);color:var(--green-dark);}
.ucheck.active{border-color:var(--green);background:#f0fdf4;color:var(--green-dark);}
.ucheck.active .ck{background:var(--green);border-color:var(--green);color:#fff;}
.gcheck:hover{border-color:var(--purple);}
.gcheck.active{border-color:var(--purple);background:#f5f3ff;color:#5b21b6;}
.gcheck.active .ck{background:var(--purple);border-color:var(--purple);color:#fff;}
.ck{width:14px;height:14px;border:2px solid var(--border);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.6rem;}

.genre-list{display:flex;flex-direction:column;gap:4px;}
.eng-opts{display:flex;flex-direction:column;gap:5px;}
.eopt{border:2px solid var(--border);border-radius:8px;padding:6px 9px;cursor:pointer;background:#f8fafc;font-size:.75rem;font-weight:700;font-family:'Noto Sans JP',sans-serif;color:var(--text-sub);transition:all .12s;}
.eopt:hover{border-color:var(--purple);}
.eopt.active{border-color:var(--purple);background:#f5f3ff;color:#5b21b6;}
.eopt-sub{font-size:.67rem;font-weight:400;color:var(--text-sub);margin-top:1px;}

.row-ctrl{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:6px;}
.row-ctrl label{font-size:.77rem;font-weight:700;white-space:nowrap;}
.sel{border:2px solid var(--border);border-radius:6px;padding:4px 9px;font-size:.77rem;font-family:'Noto Sans JP',sans-serif;background:#f8fafc;color:var(--text);outline:none;cursor:pointer;}
.sel:focus{border-color:var(--blue);}

.gen-btn{width:100%;padding:12px;background:linear-gradient(90deg,var(--blue-dark),var(--purple));color:#fff;border:none;border-radius:10px;font-size:.92rem;font-weight:700;font-family:'Kaisei Decol',serif;cursor:pointer;letter-spacing:.05em;box-shadow:0 4px 12px rgba(29,78,216,.26);transition:all .16s;margin-top:4px;}
.gen-btn:hover{transform:translateY(-2px);box-shadow:0 7px 18px rgba(29,78,216,.32);}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

.empty-state{text-align:center;padding:60px 20px;color:var(--text-sub);}
.empty-state .big{font-size:3rem;margin-bottom:10px;}

.toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.toolbar-title{font-family:'Kaisei Decol',serif;font-size:1.05rem;color:var(--blue-dark);}
.print-btn{background:var(--yellow);border:none;border-radius:8px;padding:7px 16px;font-size:.85rem;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;color:#78350f;transition:all .13s;}
.print-btn:hover{background:#f59e0b;}

.drill-page{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px 18px;margin-bottom:16px;box-shadow:var(--shadow);}
.page-label{font-size:.66rem;font-weight:700;color:var(--text-sub);letter-spacing:.1em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.page-label::after{content:'';flex:1;height:1px;background:var(--border);}
.drill-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.drill-name{font-family:'Kaisei Decol',serif;font-size:1rem;color:var(--text);}
.score-box{font-size:.78rem;color:var(--text-sub);border:1px solid var(--border);border-radius:6px;padding:3px 10px;}

.drill-instr{font-size:.86rem;font-weight:700;color:var(--text);margin-bottom:9px;padding:4px 10px;background:#fff7ed;border-left:3px solid var(--orange);border-radius:0 6px 6px 0;}
.drill-instr.blue{background:#eff6ff;border-color:var(--blue);}
.drill-instr.purple{background:#f5f3ff;border-color:var(--purple);}
.drill-instr.pink{background:#fdf2f8;border-color:var(--pink);}
.drill-instr.green{background:#f0fdf4;border-color:var(--green);}

/* 漢字 */
.k-sec{margin-bottom:18px;}
.k-row{display:flex;align-items:baseline;margin-bottom:4px;font-size:.97rem;line-height:2.2;font-family:'Noto Serif JP',serif;}
.k-row .qn{font-size:.66rem;font-weight:700;color:var(--orange);width:22px;flex-shrink:0;}
.k-row .qt{flex:1;}
.blank{display:inline-block;min-width:52px;border-bottom:1.5px solid #94a3b8;margin:0 2px;vertical-align:bottom;}

/* 通常計算 */
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 12px;}
.c-row{display:flex;align-items:center;border-bottom:1px dotted var(--border);font-family:'Noto Serif JP',serif;padding:6px 0;}
.c-row .qn{font-size:.66rem;font-weight:700;color:var(--green-dark);width:24px;flex-shrink:0;}
.c-row .formula{flex:1;display:flex;align-items:center;gap:4px;}
.ans-line{display:inline-block;min-width:50px;border-bottom:1.5px solid #94a3b8;}

/* 筆算 */
.hissan-grid{display:grid;gap:10px;margin-top:4px;width:100%;}
.hissan-card{border:1.5px solid var(--border);border-radius:8px;padding:8px 10px 6px;min-width:0;overflow:hidden;}
.hissan-card .qn-lbl{font-size:.66rem;font-weight:700;color:var(--green-dark);margin-bottom:4px;}
.hissan-problem{font-family:'Noto Serif JP',serif;font-size:.92rem;font-weight:700;white-space:normal;word-break:break-all;margin-bottom:6px;}
.dot-grid{width:100%;background-image:radial-gradient(circle,#b8c8dc 1px,transparent 1px);background-size:8px 8px;border-radius:4px;border:1px solid #dde6f0;}

/* 分数 */
.frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 2px;line-height:1.1;}
.frac-n{border-bottom:1.5px solid currentColor;padding:0 3px 1px;font-size:.9em;min-width:1.1em;text-align:center;}
.frac-d{padding:1px 3px 0;font-size:.9em;min-width:1.1em;text-align:center;}

/* 英語 */
.e-row{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px dotted var(--border);}
.e-row .qn{font-size:.66rem;font-weight:700;color:var(--purple);width:20px;flex-shrink:0;}
.e-row .jp{font-size:.88rem;min-width:75px;max-width:95px;}
.tracing-guide{font-size:.97rem;color:#c4b5fd;letter-spacing:.13em;}
.tracing-reading{font-size:.6rem;color:var(--text-sub);display:block;}
.write-line{flex:1;border-bottom:1.5px solid #94a3b8;height:24px;min-width:90px;}
.furi-wrap{display:flex;flex-direction:column;flex:1;}
.furi-r{font-size:.6rem;color:var(--text-sub);}
.furi-line{border-bottom:1.5px solid #94a3b8;width:100%;min-height:22px;display:block;}

/* かな */
.kana-row{display:flex;align-items:baseline;padding:5px 0;border-bottom:1px dotted var(--border);font-family:'Noto Serif JP',serif;}
.kana-row .qn{font-size:.66rem;font-weight:700;color:var(--pink);width:20px;flex-shrink:0;}
.kana-row .kt{font-size:.94rem;flex:1;}

.error-box{background:#fef2f2;border:2px solid #fca5a5;border-radius:10px;padding:14px 18px;color:#b91c1c;font-size:.88rem;}

/* ===== 印刷 A4縦 ===== */
@media print{
  @page{size:A4 portrait;margin:14mm 16mm 12mm 16mm;}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  body{background:#fff;font-size:10pt;}
  header,.sidebar,.toolbar,.print-btn{display:none!important;}
  .app{display:block;}.main-area{padding:0;}
  .drill-page{box-shadow:none;border:none;border-radius:0;margin:0;padding:0;page-break-after:always;break-after:page;width:100%;}
  .drill-page:last-child{page-break-after:avoid;break-after:avoid;}
  .page-label{font-size:7pt;margin-bottom:6pt;}
  .drill-title-row{margin-bottom:10pt;}
  .drill-name{font-size:13pt;font-weight:700;}
  .score-box{font-size:9pt;border:1pt solid #aaa;padding:2pt 8pt;}
  .drill-instr{font-size:9pt;padding:3pt 9pt;margin-bottom:6pt;}
  .k-sec{margin-bottom:12pt;}
  .k-row{font-size:11pt;line-height:2.2;}
  .blank{min-width:42pt;border-bottom:1pt solid #888;}
  .calc-grid{grid-template-columns:1fr 1fr;column-gap:20pt;}
  .c-row{font-size:12pt;padding:5pt 0;border-bottom:1px dotted #ccc;}
  .ans-line{min-width:42pt;border-bottom:1pt solid #888;}
  .hissan-grid{gap:6pt;display:grid;}
  .hissan-card{border:1pt solid #bbb;border-radius:4pt;padding:5pt 7pt 4pt;overflow:hidden;min-width:0;}
  .hissan-card .qn-lbl{font-size:7pt;margin-bottom:3pt;}
  .hissan-problem{font-size:9pt;margin-bottom:4pt;white-space:normal;word-break:break-all;overflow:hidden;}
  .dot-grid{background-image:radial-gradient(circle,#aab8c8 1px,transparent 1px)!important;background-size:5pt 5pt!important;border:1pt solid #ccc!important;min-height:62pt!important;}
  .frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 2pt;}
  .frac-n{border-bottom:1pt solid currentColor;padding:0 2pt 1pt;font-size:9pt;min-width:10pt;text-align:center;}
  .frac-d{padding:1pt 2pt 0;font-size:9pt;min-width:10pt;text-align:center;}
  .e-row{font-size:10pt;padding:5pt 0;border-bottom:1px dotted #ccc;}
  .tracing-guide{font-size:10.5pt;color:#c4b5fd;}
  .tracing-reading{font-size:7pt;}
  .e-row .jp{min-width:58pt;max-width:80pt;}
  .write-line{border-bottom:1pt solid #888;height:22pt;}
  .furi-line{border-bottom:1pt solid #888;min-height:20pt;}
  .furi-r{font-size:7pt;}
  .kana-row{font-size:11pt;padding:5pt 0;border-bottom:1px dotted #ccc;}
  .kana-row .blank{min-width:42pt;border-bottom:1pt solid #888;}
}
</style>
</head>
<body>
<header>
  <h1>📖 まなびドリル</h1>
  <p>科目・学年・ページ数を選んで、A4印刷対応ドリルを自動生成</p>
</header>
<div class="app">
<aside class="sidebar">
  <div class="sec">
    <div class="sec-title">📚 科目</div>
    <div class="subject-tabs">
      <button class="stab active" data-s="kanji"><span class="em">📝</span>漢字</button>
      <button class="stab" data-s="keisan"><span class="em">🔢</span>算数</button>
      <button class="stab" data-s="english"><span class="em">🔤</span>英単語</button>
      <button class="stab" data-s="kana"><span class="em">🌸</span>ひらがな・かたかな</button>
    </div>
  </div>
  <div class="sec">
    <div class="sec-title">🎓 学年</div>
    <div class="grade-pills">
      <button class="gpill active" data-g="1">小1</button>
      <button class="gpill" data-g="2">小2</button>
      <button class="gpill" data-g="3">小3</button>
      <button class="gpill" data-g="4">小4</button>
      <button class="gpill" data-g="5">小5</button>
      <button class="gpill" data-g="6">小6</button>
    </div>
  </div>
  <div class="sec" id="calc-sec" style="display:none">
    <div class="sec-title">➕ 単元（複数選択可）</div>
    <div class="unit-list" id="unit-list"></div>
  </div>
  <div class="sec" id="eng-genre-sec" style="display:none">
    <div class="sec-title">🏷️ 語彙ジャンル（複数可）</div>
    <div class="genre-list" id="genre-list"></div>
  </div>
  <div class="sec" id="eng-mode-sec" style="display:none">
    <div class="sec-title">✍️ 表示スタイル</div>
    <div class="eng-opts">
      <div class="eopt active" data-e="tracing">なぞり書き＋読み仮名<div class="eopt-sub">低・中学年向け</div></div>
      <div class="eopt" data-e="furigana">フリガナあり（書き線）<div class="eopt-sub">高学年向け</div></div>
      <div class="eopt" data-e="nofuri">フリガナなし<div class="eopt-sub">高学年・応用</div></div>
    </div>
  </div>
  <div class="sec">
    <div class="sec-title">📄 ページ・問題数</div>
    <div class="row-ctrl">
      <label>ページ数：</label>
      <select class="sel" id="pages-sel">
        <option value="1">1ページ</option><option value="2">2ページ</option>
        <option value="3">3ページ</option><option value="4">4ページ</option><option value="5">5ページ</option>
      </select>
    </div>
    <div class="row-ctrl">
      <label>1ページの問題数：</label>
      <select class="sel" id="count-sel">
        <option value="5">5問</option><option value="10" selected>10問</option>
        <option value="15">15問</option><option value="20">20問</option>
      </select>
    </div>
  </div>
  <button class="gen-btn" id="gen-btn">✨ ドリルを作る！</button>
</aside>
<main class="main-area" id="main-area">
  <div class="empty-state"><div class="big">📋</div><p>左のメニューで設定して<br>「ドリルを作る！」を押してください</p></div>
</main>
</div>

<script>
/* ================================================================
   漢字プール（学年別）
   各エントリ: {k:漢字, r:読み, s:例文（ひらがな→漢字 or 漢字→ひらがな）}
   yomi問題: 【漢字】を含む文、kaki問題: （よみ）を含む文
   ================================================================ */
const KANJI = {
  1:[
    {k:'山',r:'やま',y:'【山】に のぼる。',ky:'（やま）に のぼる。'},
    {k:'川',r:'かわ',y:'【川】で およぐ。',ky:'（かわ）で およぐ。'},
    {k:'田',r:'た',y:'【田】んぼ に カエルが いる。',ky:'（た）んぼ に カエルが いる。'},
    {k:'日',r:'ひ',y:'きょうは【日】ようびだ。',ky:'きょうは（ひ）ようびだ。'},
    {k:'月',r:'つき',y:'夜に【月】が かがやく。',ky:'よるに（つき）が かがやく。'},
    {k:'火',r:'ひ',y:'【火】に きを つける。',ky:'（ひ）に きを つける。'},
    {k:'水',r:'みず',y:'【水】を のむ。',ky:'（みず）を のむ。'},
    {k:'木',r:'き',y:'【木】に とりが とまる。',ky:'（き）に とりが とまる。'},
    {k:'金',r:'きん',y:'【金】の メダルを もらう。',ky:'（きん）の メダルを もらう。'},
    {k:'土',r:'つち',y:'【土】を ほる。',ky:'（つち）を ほる。'},
    {k:'人',r:'ひと',y:'たくさんの【人】が あつまる。',ky:'たくさんの（ひと）が あつまる。'},
    {k:'口',r:'くち',y:'大きな【口】を あける。',ky:'おおきな（くち）を あける。'},
    {k:'手',r:'て',y:'【手】を あらう。',ky:'（て）を あらう。'},
    {k:'足',r:'あし',y:'【足】が はやい。',ky:'（あし）が はやい。'},
    {k:'目',r:'め',y:'【目】を とじる。',ky:'（め）を とじる。'},
    {k:'耳',r:'みみ',y:'【耳】を すます。',ky:'（みみ）を すます。'},
    {k:'犬',r:'いぬ',y:'【犬】が なく。',ky:'（いぬ）が なく。'},
    {k:'花',r:'はな',y:'きれいな【花】が さく。',ky:'きれいな（はな）が さく。'},
    {k:'草',r:'くさ',y:'みどりの【草】が しげる。',ky:'みどりの（くさ）が しげる。'},
    {k:'石',r:'いし',y:'川の【石】を ひろう。',ky:'かわの（いし）を ひろう。'},
    {k:'上',r:'うえ',y:'たなの【上】に おく。',ky:'たなの（うえ）に おく。'},
    {k:'下',r:'した',y:'つくえの【下】に もぐる。',ky:'つくえの（した）に もぐる。'},
    {k:'大',r:'おお',y:'【大】きな こえで よぶ。',ky:'（おお）きな こえで よぶ。'},
    {k:'小',r:'ちい',y:'【小】さな むしを みつける。',ky:'（ちい）さな むしを みつける。'},
    {k:'中',r:'なか',y:'はこの【中】に はいる。',ky:'はこの（なか）に はいる。'},
    {k:'右',r:'みぎ',y:'【右】に まがる。',ky:'（みぎ）に まがる。'},
    {k:'左',r:'ひだり',y:'【左】を むく。',ky:'（ひだり）を むく。'},
    {k:'子',r:'こ',y:'げんきな【子】が あそぶ。',ky:'げんきな（こ）が あそぶ。'},
    {k:'女',r:'おんな',y:'【女】の こが わらう。',ky:'（おんな）の こが わらう。'},
    {k:'男',r:'おとこ',y:'【男】の こが はしる。',ky:'（おとこ）の こが はしる。'},
  ],
  2:[
    {k:'春',r:'はる',y:'【春】に はなが さく。',ky:'（はる）に はなが さく。'},
    {k:'夏',r:'なつ',y:'【夏】は あつい。',ky:'（なつ）は あつい。'},

/* ================================================================
   算数プール生成関数
   ================================================================ */
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

const CALC_GEN = {
  add_no_carry:()=>{
    const a=rnd(1,9),b=rnd(1,9-a);
    return {q:`${a} ＋ ${b} ＝`,a:`${a+b}`,isHissan:false};
  },
  sub_no_borrow:()=>{
    const b=rnd(1,8),a=rnd(b+1,9);
    return {q:`${a} － ${b} ＝`,a:`${a-b}`,isHissan:false};
  },
  add_carry:()=>{
    let a,b;
    do{a=rnd(2,9);b=rnd(2,9);}while(a+b<10||a+b>18);
    return {q:`${a} ＋ ${b} ＝`,a:`${a+b}`,isHissan:false};
  },
  sub_borrow:()=>{
    const ans=rnd(1,9),b=rnd(2,9);
    const a=ans+b;
    if(a<11||a>18)return CALC_GEN.sub_borrow();
    return {q:`${a} － ${b} ＝`,a:`${ans}`,isHissan:false};
  },
  add2:()=>{
    const a=rnd(10,89),b=rnd(10,99-a);
    return {q:`${a} ＋ ${b} ＝`,a:`${a+b}`,isHissan:false};
  },
  sub2:()=>{
    const b=rnd(10,79),a=rnd(b+1,99);
    return {q:`${a} － ${b} ＝`,a:`${a-b}`,isHissan:false};
  },
  hissan_add3:()=>{
    const a=rnd(100,699),b=rnd(100,999-a);
    return {q:`${a} ＋ ${b} ＝`,a:`${a+b}`,isHissan:true};
  },
  hissan_sub3:()=>{
    const b=rnd(100,599),a=rnd(b+100,999);
    return {q:`${a} － ${b} ＝`,a:`${a-b}`,isHissan:true};
  },
  kake3:()=>{
    const a=rnd(10,29),b=rnd(2,9);
    return {q:`${a} × ${b} ＝`,a:`${a*b}`,isHissan:false};
  },
  wari3:()=>{
    const b=rnd(2,9),ans=rnd(2,9);
    return {q:`${b*ans} ÷ ${b} ＝`,a:`${ans}`,isHissan:false};
  },
  wari3_r:()=>{
    const b=rnd(2,9),q=rnd(2,9),r=rnd(1,b-1);
    return {q:`${b*q+r} ÷ ${b} ＝`,a:`${q} あまり ${r}`,isHissan:false};
  },
  bunsu3:()=>{
    const d=rnd(2,6),n=rnd(1,d-1);
    return {q:`<span class="frac"><span class="frac-n">${n}</span><span class="frac-d">${d}</span></span> はどちらが大きい？ <span class="frac"><span class="frac-n">1</span><span class="frac-d">${d}</span></span> と比べて`,a:`${n>1?`${n}/${d}のほうが大きい`:`1/${d}と等しい`}`,isHissan:false};
  },
  hissan4:()=>{
    const a=rnd(11,49),b=rnd(11,49);
    return {q:`${a} × ${b} ＝`,a:`${a*b}`,isHissan:true};
  },
  wari4:()=>{
    const b=rnd(2,9),ans=rnd(10,19);
    return {q:`${b*ans} ÷ ${b} ＝`,a:`${ans}`,isHissan:false};
  },
  shosu4:()=>{
    const a=rnd(1,9),ad=rnd(1,9),b=rnd(1,9),bd=rnd(1,9);

  bunsu4:()=>{
    const d=rnd(3,8),a=rnd(1,d-1),b=rnd(1,d-a);
    return {q:`<span class="frac"><span class="frac-n">${a}</span><span class="frac-d">${d}</span></span> ＋ <span class="frac"><span class="frac-n">${b}</span><span class="frac-d">${d}</span></span> ＝`,a:`${(a+b)%d===0?Math.floor((a+b)/d):`${a+b}/${d}`}`,isHissan:false};
  },
  shosu5:()=>{
    const a=rnd(1,9),ad=rnd(1,9),b=rnd(2,5);
    const av=a+ad/10,ans=Math.round(av*b*10)/10;
    return {q:`${av.toFixed(1)} × ${b} ＝`,a:`${ans.toFixed(1)}`,isHissan:false};
  },
  bunsu5:()=>{
    // 異分母の通分足し算
    const d1=rnd(2,5),d2=rnd(2,5);
    if(d1===d2)return CALC_GEN.bunsu5();
    const n1=rnd(1,d1-1),n2=rnd(1,d2-1);
    const lcd=d1*d2,num=n1*d2+n2*d1;
    const g=gcd(num,lcd);
    const rn=num/g,rd=lcd/g;
    return {q:`<span class="frac"><span class="frac-n">${n1}</span><span class="frac-d">${d1}</span></span> ＋ <span class="frac"><span class="frac-n">${n2}</span><span class="frac-d">${d2}</span></span> ＝`,a:`${rd===1?rn:`${rn}/${rd}`}`,isHissan:false};
  },
  wariai5:()=>{
    const base=rnd(2,9)*10,rate=rnd(2,9);
    return {q:`${base} の ${rate*10}％ は？`,a:`${base*rate/10}`,isHissan:false};
  },
  bunsu6:()=>{
    const n=rnd(1,4),d=rnd(2,6),mult=rnd(2,4);
    return {q:`<span class="frac"><span class="frac-n">${n}</span><span class="frac-d">${d}</span></span> × ${mult} ＝`,a:`${n*mult%d===0?n*mult/d:`${n*mult}/${d}`}`,isHissan:false};
  },
  hirei6:()=>{
    const ratio1=rnd(1,5),ratio2=rnd(1,5);
    const g2=gcd(ratio1,ratio2);
    return {q:`${ratio1*2}：${ratio2*2} を かんたんにすると？`,a:`${ratio1/g2*2}：${ratio2/g2*2}`,isHissan:false};
  },
  bunsu6_mix:()=>{
    const n=rnd(1,3),d=rnd(2,5);
    const dec=rnd(1,3);
    const ans=Math.round((n/d+dec)*100)/100;
    return {q:`<span class="frac"><span class="frac-n">${n}</span><span class="frac-d">${d}</span></span> ＋ ${dec}.0 ＝`,a:`${ans}`,isHissan:false};
  },
};

// 九九
for(let d=2;d<=9;d++){
  CALC_GEN[`kuku_${d}`]=(()=>{
    const _d=d;
    return ()=>{
      const n=rnd(1,9);
      return {q:`${_d} × ${n} ＝`,a:`${_d*n}`,isHissan:false};
    };
  })();
}

function gcd(a,b){return b===0?a:gcd(b,a%b);}

/* ================================================================
   STATE
   ================================================================ */
let subject='kanji',gradeNum=1;
let selectedUnits=new Set();
let selectedGenres=new Set(['動物・食べ物・身の回り','色・形・数字']);
let engMode='tracing';

/* ================================================================
   EVENTS
   ================================================================ */
document.querySelectorAll('.stab').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.stab').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');subject=b.dataset.s;updateUI();
  });
});
document.querySelectorAll('.gpill').forEach(b=>{
  b.addEventListener('click',()=>{
    if(b.classList.contains('disabled'))return;
    document.querySelectorAll('.gpill').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');gradeNum=parseInt(b.dataset.g);selectedUnits=new Set();updateUI();
  });
});
document.querySelectorAll('.eopt').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.eopt').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');engMode=b.dataset.e;
  });
});
document.getElementById('gen-btn').addEventListener('click',generate);

function updateUI(){
  document.querySelectorAll('.gpill').forEach(b=>{
    const gn=parseInt(b.dataset.g);
    if(subject==='kana'&&gn>1){
      b.classList.add('disabled');
      if(b.classList.contains('active')){
        b.classList.remove('active');
        document.querySelector('.gpill[data-g="1"]').classList.add('active');
        gradeNum=1;
      }
    } else b.classList.remove('disabled');
  });
  const isCalc=subject==='keisan';
  document.getElementById('calc-sec').style.display=isCalc?'':'none';
  if(isCalc)renderUnitList();
  const isEng=subject==='english';
  document.getElementById('eng-genre-sec').style.display=isEng?'':'none';
  document.getElementById('eng-mode-sec').style.display=isEng?'':'none';
  if(isEng)renderGenreList();
}

function renderUnitList(){
  const units=MATH_UNITS[gradeNum]||[];
  const el=document.getElementById('unit-list');
  el.innerHTML='';
  if(selectedUnits.size===0&&units.length>0)selectedUnits.add(units[0].id);
  units.forEach(u=>{
    const active=selectedUnits.has(u.id);
    const d=document.createElement('div');
    d.className='ucheck'+(active?' active':'');
    d.innerHTML=`<div class="ck">${active?'✓':''}</div>${u.label}`;
    d.addEventListener('click',()=>{
      if(selectedUnits.has(u.id)){if(selectedUnits.size===1)return;selectedUnits.delete(u.id);d.classList.remove('active');d.querySelector('.ck').textContent='';}
      else{selectedUnits.add(u.id);d.classList.add('active');d.querySelector('.ck').textContent='✓';}
    });
    el.appendChild(d);
  });
}

function renderGenreList(){
  const el=document.getElementById('genre-list');el.innerHTML='';
  Object.keys(VOCAB).forEach(g=>{
    const active=selectedGenres.has(g);
    const d=document.createElement('div');
    d.className='gcheck'+(active?' active':'');
    d.innerHTML=`<div class="ck">${active?'✓':''}</div>${g}`;
    d.addEventListener('click',()=>{
      if(selectedGenres.has(g)){if(selectedGenres.size===1)return;selectedGenres.delete(g);d.classList.remove('active');d.querySelector('.ck').textContent='';}
      else{selectedGenres.add(g);d.classList.add('active');d.querySelector('.ck').textContent='✓';}
    });
    el.appendChild(d);
  });
}

/* ================================================================
   GENERATE（全科目プールベース・AIなし）
   ================================================================ */
function generate(){
  const pages=parseInt(document.getElementById('pages-sel').value);
  const count=parseInt(document.getElementById('count-sel').value);
  const main=document.getElementById('main-area');

  try{
    let results;
    if(subject==='kanji') results=genKanjiPages(pages,count);
    else if(subject==='keisan') results=genKeisanPages(pages,count);
    else if(subject==='english') results=genEnglishPages(pages,count);
    else results=genKanaPages(pages,count);
    renderDrills(results);
  }catch(e){
    main.innerHTML=`<div class="error-box">⚠️ 生成に失敗しました：${e.message}</div>`;
  }
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function genKanjiPages(pages,count){
  const pool=shuffle(KANJI[gradeNum]||[]);
  const results=[];let idx=0;
  for(let p=0;p<pages;p++){
    const qs=[];
    const half=Math.floor(count/2);
    // yomi問題
    for(let i=0;i<half;i++){
      const k=pool[idx%pool.length];idx++;
      qs.push({type:'yomi',q:k.y,a:k.r});
    }
    // kaki問題
    for(let i=0;i<count-half;i++){
      const k=pool[idx%pool.length];idx++;
      qs.push({type:'kaki',q:k.ky,a:k.k});
    }
    results.push({questions:qs});
  }
  return results;
}

function genKeisanPages(pages,count){
  const unitIds=Array.from(selectedUnits);
  const results=[];
  for(let p=0;p<pages;p++){
    const qs=[];
    for(let i=0;i<count;i++){
      const uid=unitIds[i%unitIds.length];
      const gen=CALC_GEN[uid];
      if(gen) qs.push(gen());
    }
    results.push({questions:qs});
  }
  return results;
}

function genEnglishPages(pages,count){
  let pool=[];
  Array.from(selectedGenres).forEach(g=>{if(VOCAB[g])pool=pool.concat(VOCAB[g]);});
  const seen=new Set();
  pool=pool.filter(w=>{if(seen.has(w.en))return false;seen.add(w.en);return true;});
  pool=shuffle(pool);
  const results=[];let idx=0;
  for(let p=0;p<pages;p++){
    const qs=[];
    for(let q=0;q<count;q++){if(idx>=pool.length)idx=0;qs.push({jp:pool[idx].jp,en:pool[idx].en,reading:pool[idx].r});idx++;}
    results.push({questions:qs});
  }
  return results;
}

function genKanaPages(pages,count){
  const pool=shuffle(KANA_POOL);
  const results=[];let idx=0;
  for(let p=0;p<pages;p++){
    const qs=[];
    for(let q=0;q<count;q++){if(idx>=pool.length)idx=0;qs.push(pool[idx++]);}
    results.push({questions:qs});
  }
  return results;
}

/* ================================================================
   RENDER
   ================================================================ */
function renderDrills(results){
  const main=document.getElementById('main-area');
  const sLabel={kanji:'漢字',keisan:'算数',english:'英単語',kana:'ひらがな・かたかな'}[subject];
  let html=`<div class="toolbar">
    <div class="toolbar-title">📄 ${results.length}ページのドリルが完成！（${sLabel} 小${gradeNum}年生）</div>
    <button class="print-btn" onclick="window.print()">🖨️ A4印刷</button>
  </div>`;
  results.forEach((data,pi)=>{
    html+=`<div class="drill-page">
      <div class="page-label">ページ ${pi+1} ／ ${results.length}</div>
      <div class="drill-title-row">
        <span class="drill-name">${sLabel}ドリル｜小${gradeNum}年生</span>
        <span class="score-box">なまえ：＿＿＿＿＿＿　てん：＿＿＿</span>
      </div>`;
    if(subject==='kanji') html+=renderKanji(data.questions);
    else if(subject==='keisan') html+=renderKeisan(data.questions);
    else if(subject==='english') html+=renderEnglish(data.questions);
    else html+=renderKana(data.questions);
    html+=`</div>`;
  });
  main.innerHTML=html;
}

function renderKanji(qs){
  const yomi=qs.filter(q=>q.type==='yomi');
  const kaki=qs.filter(q=>q.type==='kaki');
  let h='';
  if(yomi.length){
    h+=`<div class="k-sec"><div class="drill-instr">📖 次の漢字をひらがなで書きましょう</div>`;
    yomi.forEach((q,i)=>{
      const qt=q.q.replace(/【(.+?)】/g,`<span style="font-weight:700;color:#c2410c">$1</span><span class="blank"></span>`);
      h+=`<div class="k-row"><span class="qn">${i+1}.</span><span class="qt">${qt}</span></div>`;
    });
    h+=`</div>`;
  }
  if(kaki.length){
    h+=`<div class="k-sec" style="margin-top:14px"><div class="drill-instr blue">✏️ 次のひらがなを漢字で書きましょう</div>`;
    kaki.forEach((q,i)=>{
      const qt=q.q.replace(/（(.+?)）/g,`<span style="color:#1d4ed8">（$1）</span><span class="blank"></span>`);
      h+=`<div class="k-row"><span class="qn">${yomi.length+i+1}.</span><span class="qt">${qt}</span></div>`;
    });
    h+=`</div>`;
  }
  return h;
}

function renderKeisan(qs){
  const fs=gradeNum<=2?'1.18rem':gradeNum<=4?'1.05rem':'0.98rem';
  const pd=gradeNum<=2?'9px 0':gradeNum<=4?'7px 0':'5px 0';
  const normalQs=qs.filter(q=>!q.isHissan);
  const hissanQs=qs.filter(q=>q.isHissan);
  let h='';
  if(normalQs.length){
    h+=`<div class="drill-instr green">🔢 計算しましょう</div><div class="calc-grid">`;
    normalQs.forEach((q,i)=>{
      h+=`<div class="c-row" style="font-size:${fs};padding:${pd}">
        <span class="qn">${i+1}.</span>
        <span class="formula">${q.q} <span class="ans-line"></span></span>
      </div>`;
    });
    h+=`</div>`;
  }
  if(hissanQs.length){
    const n=hissanQs.length;
    // 最大3列。少ない場合は2列
    const cols = n<=2 ? 2 : 3;
    const cardFs = n<=4 ? '0.95rem' : '0.82rem';
    const spaceH = gradeNum<=3?'68px' : gradeNum<=4?'76px' : '84px';
    h+=`<div class="drill-instr green" style="margin-top:${normalQs.length?'14px':'0'}">📐 筆算で計算しましょう</div>
    <div class="hissan-grid" style="grid-template-columns:repeat(${cols},1fr)">`;
    hissanQs.forEach((q,i)=>{
      h+=`<div class="hissan-card">
        <div class="qn-lbl">${normalQs.length+i+1}.</div>
        <div class="hissan-problem" style="font-size:${cardFs}">${q.q}</div>
        <div class="dot-grid" style="height:${spaceH}"></div>
      </div>`;
    });
    h+=`</div>`;
  }
  return h;
}

function renderEnglish(qs){
  let h='';
  if(engMode==='tracing'){
    h+=`<div class="drill-instr purple">📝 日本語を見て、英語をなぞって書きましょう</div>`;
    qs.forEach((q,i)=>{
      h+=`<div class="e-row"><span class="qn">${i+1}.</span><span class="jp">${q.jp}</span>
        <div style="flex:1"><div class="tracing-guide">${q.en}</div><span class="tracing-reading">${q.reading}</span></div></div>`;
    });
  } else if(engMode==='furigana'){
    h+=`<div class="drill-instr purple">📝 日本語を見て、英語を書きましょう（よみがなを参考に）</div>`;
    qs.forEach((q,i)=>{
      h+=`<div class="e-row"><span class="qn">${i+1}.</span><span class="jp">${q.jp}</span>
        <div class="furi-wrap"><span class="furi-r">${q.reading}</span><span class="furi-line"></span></div></div>`;
    });
  } else {
    h+=`<div class="drill-instr purple">📝 日本語を見て、英語を書きましょう</div>`;
    qs.forEach((q,i)=>{
      h+=`<div class="e-row"><span class="qn">${i+1}.</span><span class="jp">${q.jp}</span><div class="write-line"></div></div>`;
    });
  }
  return h;
}

function renderKana(qs){
  let h=`<div class="drill-instr pink">🌸 ひらがな・カタカナの練習をしましょう</div>`;
  qs.forEach((q,i)=>{
    h+=`<div class="kana-row"><span class="qn">${i+1}.</span>
      <span class="kt">${q.q} → <span class="blank"></span>（こたえ：${q.a}）</span></div>`;
  });
  return h;
}

updateUI();
